services:

  frontend-build:
    build:
      context: ./frontend
    volumes:
      - frontend_dist:/dist

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=5000
    volumes:
      - ./backend/data:/app/data
      - frontend_dist:/app/../frontend/dist
    depends_on:
      - frontend-build
    restart: unless-stopped

volumes:
  frontend_dist:
